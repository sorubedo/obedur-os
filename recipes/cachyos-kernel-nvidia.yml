# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json
modules:
  - type: custom-kernel
    source: local
    kernel: cachyos-lto
    nvidia: true
    secrets:
      - type: env
        name: MOK_PRIVATE_KEY
        mount:
          type: file
          destination: /tmp/certs/MOK.priv
    sign:
      key: /tmp/certs/MOK.priv
      cert: /usr/share/cert/MOK.pem
      mok-password: obedur
