---
# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

modules:
  - type: os-release
    properties:
      NAME: Obedur-OS
      PRETTY_NAME: Obedur-OS (Powered By BlueBuild)

  - type: kargs
    kargs:
      - rd.luks.options=tpm2-device=auto,fido2-device=auto

  - type: fonts
    fonts:
      url-fonts:
        - name: MapleMono-NF-CN-unhinted
          url: https://github.com/subframe7536/maple-font/releases/download/v7.9/MapleMono-NF-CN-unhinted.zip

  #添加terra仓库
  - type: dnf
    repos:
      files:
        - https://github.com/terrapkg/subatomic-repos/raw/main/terra.repo
    install:
      packages:
        - terra-release

  - type: dnf
    repos:
      # nonfree: rpmfusion
      copr:
        - atim/starship
        - atim/resources
        - leloubil/wl-clip-persist
        - lemmy/favorites #satty
        - yselkowitz/nwg-shell
        - sim0n/selfuse_packages #sing-box-ref1nd
        - yalter/niri-git
    install:
      packages:
        - iwd
        - https://github.com/shazow/wifitui/releases/download/v0.12.0/wifitui-0.12.0-linux-x86_64.rpm
        - terminus-fonts-console
        - zellij
        - firewall-config
        - fprintd-pam
        - starship
        - fastfetch
        - tuigreet
        - "niri-0.0.git*"
        - ghostty
        - grim
        - slurp
        - satty
        - wl-clip-persist
        - noctalia-shell
        - kvantum
        - resources
        - nautilus
        - blueman
        - sing-box
        - fcitx5-chinese-addons
        - adw-gtk3-theme
        - nwg-look
        - bibata-cursor-theme
        - xdg-user-dirs
        - qt5ct
        - qt6ct
        - steam-devices
        - steam-device-rules
        - seahorse
        - gparted
        - xeyes
        - chezmoi
      exclude:
        - gnome-shell
        - gnome-session
        - gnome-session-wayland-session
        - gdm
        - ibus
        - fuzzel
        - alacritty
        - swaylock
        - waybar
    remove:
      auto-remove: true
      packages:
        - firefox
        - firefox-langpacks
        - tmux
        - nvtop
        - htop
        - ibus
        - ibus-chewing
        - ibus-setup
        - ibus-gtk3
        - ibus-gtk4
        - ibus-libs

  - type: script
    snippets:
      - "dnf upgrade -y"
      - "dnf autoremove -y"
      - "dnf clean all"

  - type: default-flatpaks
    configurations:
      - notify: false
        scope: user
        install:
          - io.github.flattool.Warehouse
          - com.github.tchx84.Flatseal

  - type: systemd
    system:
      enabled:
        - greetd.service
        - firewalld.service
      masked:
        - systemd-remount-fs.service

  - type: files
    files:
      - source: system
        destination: /

  - type: script
    scripts:
      - remove-unneed-dirs.sh

  - type: signing
  - type: initramfs
