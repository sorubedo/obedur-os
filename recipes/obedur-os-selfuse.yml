---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: obedur-os-selfuse
description: This is my personal self-use OS image.

base-image: ghcr.io/blue-build/base-images/fedora-base
image-version: 43

modules:
  - from-file: bootstrap.yml

  - type: custom-kernel
    source: local
    kernel: cachyos-lto
    nvidia: true
    secrets:
      - type: env
        name: MOK_PRIVATE_KEY
        mount:
          type: file
          destination: /tmp/certs/MOK.priv
    sign:
      key: /tmp/certs/MOK.priv
      cert: /usr/share/cert/MOK.pem
      mok-password: obedur

  - from-file: core.yml

  - type: dnf
    repos:
      nonfree: rpmfusion
      copr: bieszczaders/kernel-cachyos-addons
    install:
      packages:
        - ayugram-desktop
        - quickemu
        - scx-scheds-git
        - scx-tools-git
        - scx-manager
    replace:
      - from-repo: copr:copr.fedorainfracloud.org:bieszczaders/kernel-cachyos-addons
        packages:
          - old: zram-generator-defaults
            new: cachyos-settings

  - from-file: finalize.yml
