site_name: Obedur-OS
site_url: https://sorubedo.github.io/obedur-os/
repo_url: https://github.com/sorubedo/obedur-os
theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: 切换到暗色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: 切换到亮色模式

nav:
  - 首页: index.md
  - 安装指南: installation.md
  - 桌面操作: desktop.md
  - 常见问题: faq.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - tables
  - pymdownx.highlight
  - pymdownx.superfences